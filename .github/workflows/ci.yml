name: CI
on:
  pull_request:
    branches: [main]

# Builds crm/ on every PR to main. Required by branch protection, so a PR
# can only auto-merge (and therefore auto-deploy) once this passes.
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          # Placeholder values so the build doesn't fail on missing env.
          # Real secrets live in Vercel, not in CI.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
