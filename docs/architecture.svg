<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="900" viewBox="0 0 1240 900" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowIn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOut" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowGate" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <style>
      .box { rx:12; ry:12; stroke-width:1.5; }
      .title { font-size:15px; font-weight:700; }
      .sub { font-size:11.5px; fill:#475569; }
      .lbl { font-size:11px; font-weight:600; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; }
      .head { font-size:13px; font-weight:700; fill:#0f172a; }
    </style>
  </defs>

  <rect width="1240" height="900" fill="#f8fafc"/>
  <text x="40" y="46" font-size="26" font-weight="800" fill="#0f172a">HMD Secure CRM — Orchestration Architecture</text>
  <text x="40" y="70" font-size="13.5" fill="#64748b">Notion-driven, build-gated, self-deploying pipeline · 4-person team · deadline Sun 15:00</text>

  <!-- ===================== LANE: NOTION ===================== -->
  <rect x="40" y="100" width="300" height="700" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="60" y="128" class="head">🗒️ NOTION (per person)</text>

  <!-- Prompt inbox -->
  <rect x="62" y="148" width="256" height="92" class="box" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="78" y="174" class="title" fill="#1e3a8a">🟢 Prompt inbox  (IN)</text>
  <text x="78" y="196" class="sub">Plain-language prompt typed by</text>
  <text x="78" y="212" class="sub">the (non-dev) teammate.</text>
  <text x="78" y="230" class="sub" fill="#1d4ed8">Block deleted after ingest →</text>

  <!-- Planning -->
  <rect x="62" y="600" width="256" height="100" class="box" fill="#dcfce7" stroke="#4ade80"/>
  <text x="78" y="626" class="title" fill="#166534">📝 Planning  (OUT)</text>
  <text x="78" y="648" class="sub">Live commit feed of what the</text>
  <text x="78" y="664" class="sub">session shipped:</text>
  <text x="78" y="686" class="mono" fill="#15803d">🔧 d1ee41b · subj · 1 file · 16:26</text>

  <!-- ===================== LANE: LOCAL MACHINE ===================== -->
  <rect x="380" y="100" width="430" height="700" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="400" y="128" class="head">💻 LOCAL MAC  (3 daemons + tmux)</text>

  <!-- poller -->
  <rect x="402" y="148" width="386" height="96" class="box" fill="#fff7ed" stroke="#fdba74"/>
  <text x="418" y="174" class="title" fill="#9a3412">watcher/poll.mjs</text>
  <text x="418" y="195" class="sub">Polls each inbox every 2s (Notion API).</text>
  <text x="418" y="212" class="sub">IN: paste-injects prompt into tmux pane.</text>
  <text x="418" y="229" class="sub">OUT: posts new commits → Planning page.</text>

  <!-- tmux grid -->
  <rect x="402" y="266" width="386" height="150" class="box" fill="#ffffff" stroke="#94a3b8"/>
  <text x="418" y="291" class="title" fill="#0f172a">🪟 tmux session "hmd" — 2×2 grid</text>
  <g class="mono" fill="#0f172a">
    <rect x="418" y="304" width="172" height="44" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="430" y="322">▸ joonatan</text><text x="430" y="338" fill="#64748b">app shell · rep · brand</text>
    <rect x="600" y="304" width="172" height="44" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="612" y="322">▸ arttu</text><text x="612" y="338" fill="#64748b">db · supabase · auth</text>
    <rect x="418" y="356" width="172" height="44" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="430" y="374">▸ nuutti</text><text x="430" y="390" fill="#64748b">sm · finance · offers</text>
    <rect x="600" y="356" width="172" height="44" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="612" y="374">▸ aarni</text><text x="612" y="390" fill="#64748b">tam · AI · seed</text>
  </g>
  <text x="418" y="412" class="sub">Each pane = a Claude session in worktrees/&lt;name&gt; on branch person/&lt;name&gt;</text>

  <!-- autopush -->
  <rect x="402" y="438" width="184" height="86" class="box" fill="#fef9c3" stroke="#facc15"/>
  <text x="418" y="463" class="title" fill="#854d0e">autopush.sh</text>
  <text x="418" y="483" class="sub">every 60s:</text>
  <text x="418" y="499" class="sub">push person/* →</text>
  <text x="418" y="515" class="sub">GitHub</text>

  <!-- integrator -->
  <rect x="604" y="438" width="184" height="86" class="box" fill="#ffedd5" stroke="#fb923c"/>
  <text x="620" y="463" class="title" fill="#9a3412">merge-integrator.sh</text>
  <text x="620" y="483" class="sub">every 60s: merge</text>
  <text x="620" y="499" class="sub">person/* → main,</text>
  <text x="620" y="515" class="sub" fill="#c2410c">BUILD-GATED ⛔</text>

  <!-- worktrees note -->
  <rect x="402" y="548" width="386" height="68" class="box" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="418" y="572" class="title" fill="#0f172a">🌿 git worktrees + lanes</text>
  <text x="418" y="592" class="sub">Disjoint folders per person ⇒ conflict-free merges.</text>
  <text x="418" y="608" class="sub">All person/* re-rooted on main ⇒ standard merges work.</text>

  <!-- ===================== LANE: CLOUD ===================== -->
  <rect x="850" y="100" width="350" height="700" rx="16" fill="#faf5ff" stroke="#e9d5ff"/>
  <text x="870" y="128" class="head">☁️ CLOUD</text>

  <!-- GitHub -->
  <rect x="872" y="148" width="306" height="120" class="box" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="888" y="174" class="title" fill="#6b21a8">🐙 GitHub  joonatanknuutila/sandelcode</text>
  <text x="888" y="197" class="sub">person/joonatan · person/arttu</text>
  <text x="888" y="213" class="sub">person/nuutti · person/aarni</text>
  <text x="888" y="235" class="sub" fill="#7c3aed">main  ← build-gated merges</text>
  <text x="888" y="255" class="sub">CI: builds crm/ on PRs</text>

  <!-- Vercel -->
  <rect x="872" y="300" width="306" height="96" class="box" fill="#f5f5f5" stroke="#71717a"/>
  <text x="888" y="326" class="title" fill="#18181b">▲ Vercel  (root = crm/)</text>
  <text x="888" y="347" class="sub">Auto-deploys every push to main.</text>
  <text x="888" y="365" class="sub">Next.js 16 · App Router · Tailwind</text>

  <!-- Live site -->
  <rect x="872" y="428" width="306" height="92" class="box" fill="#dcfce7" stroke="#22c55e"/>
  <text x="888" y="454" class="title" fill="#166534">🌐 LIVE SITE</text>
  <text x="888" y="476" class="mono" fill="#15803d">web-teal-xi-17.vercel.app</text>
  <text x="888" y="497" class="sub">"HMD Secure CRM" — what judges see</text>

  <!-- Supabase -->
  <rect x="872" y="552" width="306" height="92" class="box" fill="#ecfdf5" stroke="#10b981"/>
  <text x="888" y="578" class="title" fill="#065f46">🗄️ Supabase  (eu-north-1)</text>
  <text x="888" y="599" class="mono" fill="#047857">xwsmovmtfymiqvgjicfk</text>
  <text x="888" y="620" class="sub">Postgres · RLS · seed data</text>

  <!-- ===================== FLOW ARROWS ===================== -->
  <!-- IN: inbox -> poller -->
  <path d="M318 194 H402" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowIn)"/>
  <text x="330" y="186" class="lbl" fill="#2563eb">IN ②s</text>
  <!-- poller -> tmux (inject) -->
  <path d="M595 244 V266" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowIn)"/>
  <text x="600" y="260" class="lbl" fill="#2563eb">inject</text>
  <!-- tmux -> autopush (commits) -->
  <path d="M494 416 V438" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="432" class="lbl" fill="#475569">commit</text>
  <!-- tmux -> integrator (commits) -->
  <path d="M696 416 V438" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- tmux -> Planning (OUT) : route down left then into notion -->
  <path d="M402 380 C 360 380, 340 470, 340 540 S 320 595, 318 640" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowOut)"/>
  <text x="300" y="470" class="lbl" fill="#16a34a" transform="rotate(0)">OUT</text>
  <text x="288" y="486" class="sub" fill="#16a34a">commit feed</text>

  <!-- autopush -> GitHub -->
  <path d="M586 470 C 740 470, 760 220, 872 210" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="724" y="330" class="lbl" fill="#475569">push person/*</text>
  <!-- integrator -> GitHub main -->
  <path d="M788 472 C 830 460, 840 300, 872 246" fill="none" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arrowGate)"/>
  <text x="792" y="392" class="lbl" fill="#ea580c">merge→main</text>
  <text x="792" y="408" class="sub" fill="#ea580c">if crm/ builds</text>
  <!-- GitHub main -> Vercel -->
  <path d="M1025 268 V300" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1032" y="288" class="lbl" fill="#475569">on push</text>
  <!-- Vercel -> Live -->
  <path d="M1025 396 V428" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowOut)"/>
  <text x="1032" y="416" class="lbl" fill="#16a34a">deploy</text>
  <!-- Live <-> Supabase -->
  <path d="M1025 520 V552" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrowOut)"/>
  <text x="1032" y="540" class="lbl" fill="#10b981">data</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="40" y="824" width="1160" height="54" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="58" y="845" class="lbl" fill="#0f172a">Legend:</text>
  <line x1="120" y1="841" x2="150" y2="841" stroke="#2563eb" stroke-width="3"/><text x="156" y="845" class="sub">IN: Notion → session</text>
  <line x1="300" y1="841" x2="330" y2="841" stroke="#16a34a" stroke-width="3"/><text x="336" y="845" class="sub">OUT: session/deploy → Notion &amp; web</text>
  <line x1="560" y1="841" x2="590" y2="841" stroke="#ea580c" stroke-width="3"/><text x="596" y="845" class="sub">build-gated auto-merge ⛔</text>
  <line x1="800" y1="841" x2="830" y2="841" stroke="#475569" stroke-width="3"/><text x="836" y="845" class="sub">internal push / commit</text>
  <text x="58" y="868" class="sub">Daemons: poll.mjs (PID 34478) · merge-integrator.sh (29131) · autopush.sh (5218). A broken build is rolled back &amp; skipped; good branches still ship.</text>
</svg>
