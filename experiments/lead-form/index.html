<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <title>HMD Secure — Lead intake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0f1a;
      color: #e6e9f2;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 {
      font-size: 24px;
      letter-spacing: -0.01em;
      margin: 0 0 8px;
    }
    .sub {
      color: #8b93a7;
      font-size: 14px;
      margin: 0 0 32px;
    }
    form {
      background: #131826;
      border: 1px solid #1f2638;
      border-radius: 12px;
      padding: 24px;
    }
    .row { display: flex; gap: 16px; }
    .row > * { flex: 1; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #c8cee0;
    }
    label .req { color: #ff6b6b; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: #0b0f1a;
      border: 1px solid #2a3148;
      border-radius: 8px;
      color: #e6e9f2;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4a7cff;
    }
    .field { margin-bottom: 16px; }
    textarea { resize: vertical; min-height: 80px; }
    button {
      background: #4a7cff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #3b6ae8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    .status.ok { background: #0f3a23; color: #74e08e; border: 1px solid #1f5c3b; }
    .status.err { background: #3a0f0f; color: #ff8585; border: 1px solid #5c1f1f; }
    .saved {
      margin-top: 32px;
      background: #131826;
      border: 1px solid #1f2638;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .saved h2 { font-size: 14px; color: #8b93a7; margin: 0 0 12px; font-weight: 600; }
    .lead-row {
      padding: 10px 0;
      border-bottom: 1px solid #1f2638;
      font-size: 13px;
    }
    .lead-row:last-child { border-bottom: none; }
    .lead-row .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .lead-row .meta { color: #8b93a7; font-size: 12px; }
    .empty { color: #8b93a7; font-size: 13px; padding: 8px 0; }
    .enrich-btn {
      background: #1f2638;
      color: #c8cee0;
      border: 1px solid #2a3148;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin: 0;
    }
    .enrich-btn:hover { background: #2a3148; }
    .brief {
      margin-top: 12px;
      padding: 14px;
      background: #0b0f1a;
      border: 1px solid #2a3148;
      border-radius: 8px;
      display: none;
    }
    .brief.open { display: block; }
    .brief h3 {
      font-size: 13px;
      color: #74e08e;
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .brief .headline {
      font-size: 14px;
      color: #e6e9f2;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .brief .section { margin-top: 14px; }
    .brief .label {
      font-size: 11px;
      text-transform: uppercase;
      color: #8b93a7;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .brief .value {
      font-size: 13px;
      color: #c8cee0;
      line-height: 1.55;
    }
    .brief ol, .brief ul {
      margin: 0;
      padding-left: 20px;
      font-size: 13px;
      color: #c8cee0;
      line-height: 1.55;
    }
    .brief .flag {
      background: #3a2f0f;
      color: #f5d574;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin: 8px 0;
      border: 1px solid #5c4a1f;
    }
    .brief .recommended {
      display: inline-block;
      background: #0f3a23;
      color: #74e08e;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Live progress panel */
    .progress {
      margin-top: 12px;
      padding: 14px;
      background: #0b0f1a;
      border: 1px solid #2a3148;
      border-radius: 8px;
      display: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .progress.open { display: block; }
    .steps-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .step-dot {
      flex: 1;
      padding: 6px 8px;
      background: #1a1f2e;
      border: 1px solid #2a3148;
      border-radius: 6px;
      font-size: 11px;
      color: #6b7388;
      text-align: center;
      transition: all 0.2s;
    }
    .step-dot.active {
      background: #2a3148;
      color: #f5d574;
      border-color: #5c4a1f;
    }
    .step-dot.done {
      background: #0f3a23;
      color: #74e08e;
      border-color: #1f5c3b;
    }
    .activity {
      font-size: 12px;
      color: #c8cee0;
      max-height: 280px;
      overflow-y: auto;
    }
    .activity .line {
      padding: 4px 0;
      border-bottom: 1px solid #131826;
      animation: fadein 0.3s ease;
    }
    .activity .line:last-child { border-bottom: none; }
    .activity .line.step-h {
      color: #f5d574;
      font-weight: 600;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2a3148;
    }
    .activity .line.search { color: #8b93a7; }
    .activity .line.found { color: #74e08e; }
    .activity .line.found .src {
      color: #4a7cff;
      font-size: 11px;
      margin-left: 8px;
    }
    .activity .line.step-d {
      color: #74e08e;
      font-size: 11px;
      padding-left: 14px;
    }
    .activity .line.ai {
      color: #c79bff;
      font-weight: 600;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2a3148;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spinner {
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 2px solid #2a3148;
      border-top-color: #f5d574;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>HMD Secure — Lead intake</h1>
    <p class="sub">Sales rep manual entry. Submits to <code>submissions.json</code>.</p>

    <form id="lead-form">
      <div class="row">
        <div class="field">
          <label>Etunimi <span class="req">*</span></label>
          <input name="first_name" required />
        </div>
        <div class="field">
          <label>Sukunimi <span class="req">*</span></label>
          <input name="last_name" required />
        </div>
      </div>

      <div class="field">
        <label>Email <span class="req">*</span></label>
        <input name="email" type="email" required placeholder="firstname.lastname@company.com" />
      </div>

      <div class="row">
        <div class="field">
          <label>Firma <span class="req">*</span></label>
          <input name="company" required />
        </div>
        <div class="field">
          <label>Firman ala</label>
          <input name="industry" placeholder="Banking, Public sector, Industrial..." />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Maa</label>
          <input name="country" value="Finland" />
        </div>
        <div class="field">
          <label>Tuote josta kiinnostunut <span class="req">*</span></label>
          <select name="product_interest" required>
            <option value="">Valitse...</option>
            <option>HMD Fota</option>
            <option>HMD Terra M</option>
            <option>HMD Ivalo XE</option>
            <option>HMD Enable Pro</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Viesti (vapaaehtoinen)</label>
        <textarea name="message" placeholder="Lyhyt viesti, mitä asiakas kertoi tarvitsevansa..."></textarea>
      </div>

      <button type="submit" id="submit-btn">Tallenna lead</button>
      <div id="status"></div>
    </form>

    <div class="saved">
      <h2>Tallennetut leadit (<span id="count">0</span>)</h2>
      <div id="saved-list"><div class="empty">Ei vielä tallennettuja.</div></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("lead-form");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("submit-btn");
    const savedList = document.getElementById("saved-list");
    const countEl = document.getElementById("count");

    async function refreshSaved() {
      try {
        const res = await fetch("/api/leads");
        const data = await res.json();
        countEl.textContent = data.length;
        if (data.length === 0) {
          savedList.innerHTML = '<div class="empty">Ei vielä tallennettuja.</div>';
          return;
        }
        savedList.innerHTML = data
          .slice()
          .reverse()
          .map(
            (l) => `
              <div class="lead-row" data-id="${l.id}">
                <div class="top">
                  <div>
                    <strong>${l.first_name} ${l.last_name}</strong> — ${l.company}
                    <div class="meta">${l.product_interest} · ${l.country || ""}</div>
                  </div>
                  <button class="enrich-btn" data-action="enrich" data-id="${l.id}">Rikastuta</button>
                </div>
                <div class="progress" id="progress-${l.id}"></div>
                <div class="brief" id="brief-${l.id}"></div>
              </div>`
          )
          .join("");

        document.querySelectorAll('[data-action="enrich"]').forEach((btn) => {
          btn.addEventListener("click", () => runEnrichment(btn.dataset.id, btn));
        });
      } catch (e) {
        // ignore
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      statusEl.innerHTML = "";

      const data = Object.fromEntries(new FormData(form).entries());
      try {
        const res = await fetch("/api/leads", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error("Server error " + res.status);
        statusEl.innerHTML = '<div class="status ok">Tallennettu ✓</div>';
        form.reset();
        form.querySelector('[name="country"]').value = "Finland";
        await refreshSaved();
      } catch (err) {
        statusEl.innerHTML = `<div class="status err">Virhe: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    });

    function renderBrief(briefEl, d) {
        const b = d.pre_meeting_brief;
        briefEl.innerHTML = `
          <h3>Pre-meeting brief</h3>
          <div class="headline">${b.headline}</div>

          <div class="section">
            <div class="label">Rapport opener</div>
            <div class="value">"${b.rapport_opener}"</div>
          </div>

          <div class="section">
            <div class="label">3 discovery questions</div>
            <ol>
              ${b.three_discovery_questions.map((q) => `<li>${q}</li>`).join("")}
            </ol>
          </div>

          <div class="section">
            <div class="label">Suositeltu tuote</div>
            <div class="value"><span class="recommended">${b.recommended_product}</span></div>
            ${b.product_interest_flag ? `<div class="flag">⚠ ${b.product_interest_flag}</div>` : ""}
          </div>

          <div class="section">
            <div class="label">Kilpailija-intel</div>
            <ul>${b.competitor_intel.map((c) => `<li>${c}</li>`).join("")}</ul>
          </div>

          <div class="section">
            <div class="label">Mitä EI kannata nostaa</div>
            <ul>${b.things_not_to_mention.map((c) => `<li>${c}</li>`).join("")}</ul>
          </div>

          <div class="section">
            <div class="label">Decision chain</div>
            <div class="value">${b.decision_chain}</div>
          </div>

          <div class="section">
            <div class="label">Dealin koko-arvio</div>
            <div class="value">${b.deal_sizing}</div>
          </div>

          <div class="section">
            <div class="label">Confidence</div>
            <div class="value">${Math.round(b.confidence * 100)}%</div>
          </div>
        `;
        briefEl.classList.add("open");
    }

    function runEnrichment(id, btn) {
      const progressEl = document.getElementById(`progress-${id}`);
      const briefEl = document.getElementById(`brief-${id}`);

      // Toggle close
      if (progressEl.classList.contains("open") || briefEl.classList.contains("open")) {
        progressEl.classList.remove("open");
        briefEl.classList.remove("open");
        progressEl.innerHTML = "";
        briefEl.innerHTML = "";
        btn.textContent = "Rikastuta";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Rikastetaan...";

      // Build initial progress UI
      progressEl.innerHTML = `
        <div class="steps-bar" id="steps-${id}">
          ${[1, 2, 3, 4, 5].map((n) => `<div class="step-dot" data-step="${n}">Vaihe ${n}</div>`).join("")}
        </div>
        <div class="activity" id="activity-${id}"></div>
      `;
      progressEl.classList.add("open");

      const activityEl = document.getElementById(`activity-${id}`);
      const stepsEl = document.getElementById(`steps-${id}`);

      const stepLabels = {
        1: "Domain extract",
        2: "Verify employment",
        3: "Company website news",
        4: "Company intel",
        5: "Person intel",
      };

      const appendLine = (cls, html) => {
        const div = document.createElement("div");
        div.className = `line ${cls}`;
        div.innerHTML = html;
        activityEl.appendChild(div);
        activityEl.scrollTop = activityEl.scrollHeight;
      };

      const es = new EventSource(`/api/enrich-stream/${id}`);

      es.onmessage = async (msgEvent) => {
        const ev = JSON.parse(msgEvent.data);

        if (ev.type === "step_start") {
          // Mark current step active
          stepsEl.querySelectorAll(".step-dot").forEach((d) => {
            const n = parseInt(d.dataset.step);
            if (n < ev.step) d.classList.add("done");
            if (n === ev.step) d.classList.add("active");
          });
          appendLine(
            "step-h",
            `<span class="spinner"></span>Vaihe ${ev.step}/${ev.total} — ${ev.label}`
          );
        } else if (ev.type === "search") {
          appendLine("search", `🔍 Haetaan: <em>${escapeHtml(ev.query)}</em>`);
        } else if (ev.type === "found") {
          appendLine(
            "found",
            `✓ ${escapeHtml(ev.finding)}<span class="src">${escapeHtml(ev.source)}</span>`
          );
        } else if (ev.type === "step_done") {
          // Mark step done
          stepsEl.querySelector(`[data-step="${ev.step}"]`)?.classList.remove("active");
          stepsEl.querySelector(`[data-step="${ev.step}"]`)?.classList.add("done");
          appendLine("step-d", `↳ ${escapeHtml(ev.summary)}`);
        } else if (ev.type === "ai_brief") {
          appendLine("ai", `<span class="spinner"></span>🧠 ${escapeHtml(ev.label)}`);
        } else if (ev.type === "done") {
          es.close();
          btn.disabled = false;
          btn.textContent = "Sulje";

          if (ev.brief_ready) {
            try {
              const res = await fetch(`/api/enriched/${id}`);
              if (res.ok) {
                const data = await res.json();
                renderBrief(briefEl, data);
              }
            } catch {}
          } else {
            briefEl.innerHTML = `<div class="flag">Demo-tila: brief generoidaan vain Marcille. Live-tuotannossa Anthropic API tuottaisi brief'n tähän automaattisesti.</div>`;
            briefEl.classList.add("open");
          }
        }
      };

      es.onerror = () => {
        es.close();
        btn.disabled = false;
        btn.textContent = "Yritä uudelleen";
        appendLine("search", "⚠ Stream-yhteys katkesi");
      };
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    refreshSaved();
  </script>
</body>
</html>
